services:
  server:
    build:
      context: ../../server
    container_name: blood-insight-server
    restart: unless-stopped
    environment:
      PORT: 8080
      ALLOWED_ORIGIN: http://${DDNS_HOST}:${WEB_PORT}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      GEMINI_MODEL: ${GEMINI_MODEL}
    volumes:
      - ../../server/data:/app/data
    ports:
      - "${API_PORT}:8080"

  web:
    build:
      context: ../../app
      args:
        VITE_API_BASE_URL: http://${DDNS_HOST}:${API_PORT}
    container_name: blood-insight-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${WEB_PORT}:80"
